            --muted: #9a9089;     /* 次文字 */

            --rose: #a9797d;      /* 莫蘭迪玫瑰（主色）*/
            --rose-soft: #eaddda;
            --sage: #7e9078;      /* 莫蘭迪鼠尾草 */
            --gold: #b8975f;      /* 沉靜赭金 */
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
            padding-top: 5.25rem;   /* 手機：兩列頂欄（品牌＋頁籤）高度 */

        @media (min-width: 640px) { body { padding-top: 3.5rem; } }   /* 桌機：單列頂欄 */
        /* 固定頂欄：原生 CSS 保險，不依賴 Tailwind CDN class 生成 */
        body > header {
            position: fixed !important;
            top: 0; left: 0; right: 0;
            z-index: 50;
        }
        h1, h2, h3, .serif { font-family: 'Cormorant Garamond', 'Noto Serif TC', serif; }
        .cn-serif { font-family: 'Noto Serif TC', serif; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 纖細導覽列頁籤 */
        .tab-btn { position: relative; transition: color .25s ease; color: var(--muted); font-weight: 500; padding: .55rem .85rem; border-radius: 8px; white-space: nowrap; }
        .tab-btn:hover { color: var(--rose); }
        .tab-active { color: var(--rose); font-weight: 700; }
        .tab-active::after { content:''; position:absolute; left:14%; right:14%; bottom:-1px; height:2px; background: var(--rose); border-radius: 2px; }

        .fade-in { animation: fadeIn .45s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 左側日程清單 */
        .day-item { transition: background .2s ease, border-color .2s ease; border: 1px solid transparent; cursor: pointer; }
        .day-item:hover { background: #fff; border-color: var(--line); }
        .day-active { background: #fff; border-color: var(--rose-soft); box-shadow: 0 2px 10px rgba(169,121,125,.10); }

        /* 時段色帶（莫蘭迪柔調）*/
        .slot-am { background:#f2ead9; color:#8a6d3b; }
        .slot-pm { background:#f1e2da; color:#8f5a45; }
        .slot-ni { background:#e4e6ef; color:#565f80; }

        .chip { display:inline-flex; align-items:center; gap:.4rem; padding:.4rem .7rem; border-radius:999px; font-size:.78rem; font-weight:600; border:1px solid var(--line); background:var(--surface); color:var(--ink); transition:all .2s; }
        .chip:hover { border-color: var(--rose-soft); color: var(--rose); }

        .ck { cursor: pointer; }
        .ck .tick-on { display: none; }
        .ck.done .tick-on { display: inline-block; }
        .ck.done .tick-off { display: none; }
        .ck.done .ck-label { text-decoration: line-through; color: #bcae9f; }
        .ck.done .ck-desc { color: #cdbfae; }

        .map-loc-on { background: #fff !important; border-color: var(--rose-soft) !important; }
        .card { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; }

            return groups;

                </div>
                <div class="card p-5">
                    <h3 class="font-bold text-[var(--ink)] mb-4 pb-2.5 border-b border-[var(--line)] flex items-center gap-2"><i class="fa-solid fa-gift" style="color:var(--rose)"></i>伴手禮採購地圖</h3>
                    <div class="grid md:grid-cols-2 gap-3">${souvCards}</div>
                </div>`;
        }

        function prepItemHTML(it, color) {
            const key = String(it.item || '').replace(/"/g, '&quot;');
            return `
                <li class="ck ck-prep flex items-start gap-3 px-3 py-2.5 rounded-lg hover:bg-[#f6f1ea] transition-colors ${it.done ? 'done' : ''}" data-key="${key}" ${it.row ? `data-row="${it.row}"` : ''}>
                    <span class="mt-0.5 text-lg leading-none"><i class="fa-regular fa-square tick-off text-[#cdbfae]"></i><i class="fa-solid fa-square-check tick-on" style="color:${color}"></i></span>
                    <span><span class="ck-label font-semibold text-[var(--ink)] text-sm">${it.item}</span><span class="ck-desc block text-xs text-[#6b635c] mt-1 leading-relaxed">${it.desc}</span></span>
                </li>`;
        }

        function generatePrepHTML(groups) {
            const flights = FLIGHTS.map(f => `
                <div class="flex items-center gap-4 py-3 border-b border-[#f0e9df] last:border-0">
                    <div class="serif font-bold text-[var(--ink)] w-24 flex-shrink-0">${f.date}</div>
                    <div class="flex-1 min-w-0"><div class="font-medium text-[var(--ink)] text-sm">${f.route}</div><div class="text-xs text-[var(--muted)] mt-0.5">${f.note}</div></div>
                    <div class="serif font-bold text-right flex-shrink-0 text-sm" style="color:var(--rose)">${f.code}</div>
                </div>`).join('');

            const cats = groups.map(g => `
                <div class="card overflow-hidden">
                    <div class="px-5 py-3.5 flex items-center gap-3 border-b border-[var(--line)]" style="background:${g.color}12">
                        <span class="w-9 h-9 rounded-lg flex items-center justify-center text-white flex-shrink-0" style="background:${g.color}"><i class="fa-solid ${g.icon}"></i></span>
                        <h3 class="font-bold text-[var(--ink)]">${g.cat}</h3>
                    </div>
                    <ul class="p-2.5">${g.items.map(it => prepItemHTML(it, g.color)).join('')}</ul>
                </div>`).join('');

            const syncNote = SHEET_SYNC_URL
                ? '<span class="inline-flex items-center gap-1.5" style="color:var(--sage)"><i class="fa-solid fa-cloud-arrow-up"></i> 已連動 Google Sheet，勾選即時雙向同步</span>'
                : '<span class="inline-flex items-center gap-1.5 text-[var(--muted)]"><i class="fa-solid fa-circle-info"></i> 勾選暫存於本機</span>';

            return `
                ${sectionHeader('fa-suitcase-rolling', '行前準備', '可逐項勾選核對；與 Google Sheet 雙向同步')}
                <div class="text-center -mt-3 mb-5 text-xs">${syncNote}</div>
                <div class="card p-5 mb-4">
                    <h3 class="font-bold text-[var(--ink)] mb-3 pb-2.5 border-b border-[var(--line)] flex items-center gap-2"><i class="fa-solid fa-plane-up" style="color:var(--rose)"></i>航班與跨城交通總覽</h3>
                    ${flights}
                </div>
                <div class="grid md:grid-cols-2 gap-4">${cats}</div>`;
        }

        function prepLoadingHTML() {
            return `${sectionHeader('fa-suitcase-rolling', '行前準備', '可逐項勾選核對')}
                <div class="text-center text-[var(--muted)] py-16"><i class="fa-solid fa-spinner fa-spin text-2xl mb-3"></i><p class="text-sm">正在讀取最新清單…</p></div>`;
        }

        /* ---- 總覽地圖 ---- */
        const COORDS = {
            "St. Stephen's Cathedral, Vienna": [48.208492, 16.373127],
            "Schönbrunn Palace, Vienna": [48.184989, 16.311568],
            "Belvedere Palace, Vienna": [48.191072, 16.379761],
            "Kärntner Straße, Vienna": [48.206005, 16.371388],
            "Salzburg Altstadt": [47.798200, 13.045500],
            "Königssee, Germany": [47.592600, 12.988600],
            "Hallstatt, Austria": [47.534794, 13.598888],
            "5 Fingers, Dachstein": [47.5099, 13.6883],
            "Nice, France": [43.700936, 7.268391],
            "Promenade des Anglais, Nice": [43.685989, 7.237476],
            "Eze Village, France": [43.729783, 7.361885],
            "Cannes, France": [43.55152, 7.013442],
            "Grasse, France": [43.658901, 6.92391],
            "Villefranche-sur-Mer": [43.704232, 7.309969],
            "Gare de Lyon, Paris": [48.844382, 2.3748],
            "Palace of Versailles": [48.804425, 2.120285],
            "Louvre Museum": [48.861147, 2.338028],
            "Arc de Triomphe": [48.873779, 2.295037],
            "Sacré-Cœur, Paris": [48.886806, 2.343015],
            "Disneyland Paris": [48.870093, 2.77405],
            "Musée d'Orsay": [48.859918, 2.326585],
            "Charles de Gaulle Airport": [49.006891, 2.571082]
        };
        let homeMap = null, homeMarkers = {};

        function generateHomeHTML() {
            const order = ['vienna', 'lake', 'riviera', 'paris'];
            let total = 0; order.forEach(k => total += itineraryData[k].length);

            const list = order.map(key => {
                const st = STAGE[key];
                const days = itineraryData[key].map((d, i) => `
                    <button class="map-loc w-full text-left flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-[#f6f1ea] transition-colors border border-transparent" data-q="${String(d.mapQuery).replace(/"/g, '&quot;')}" data-region="${key}" data-idx="${i}">
                        <span class="text-[11px] font-bold text-white px-2 py-0.5 rounded flex-shrink-0" style="background:${st.color}">${d.date.split(' ')[0]}</span>
                        <span class="min-w-0 flex-1"><span class="block font-semibold text-[var(--ink)] text-sm truncate">${d.dayTitle}</span></span>
                        <i class="fa-solid fa-chevron-right text-[var(--muted)] text-xs flex-shrink-0"></i>
                    </button>`).join('');
                return `
                    <div class="mb-4">
                        <div class="flex items-center gap-2 mb-1.5 px-1"><span class="w-2.5 h-2.5 rounded-full" style="background:${st.color}"></span><h3 class="font-bold text-[var(--ink)] text-sm">${st.name}</h3><span class="text-xs text-[var(--muted)]">${itineraryData[key].length} 天</span></div>
                        <div class="card p-1.5">${days}</div>
                    </div>`;
            }).join('');

            const routeDir = 'https://www.google.com/maps/dir/' + ['Vienna Austria', 'Salzburg Austria', 'Hallstatt Austria', 'Nice France', 'Paris France', 'Charles de Gaulle Airport'].map(encodeURIComponent).join('/');

            return `
                ${sectionHeader('fa-map-location-dot', '行程總覽', '點左側任一天可在地圖標示位置；點卡片右上分頁閱讀完整每日行程')}
                <div class="grid lg:grid-cols-5 gap-5">
                    <div class="lg:col-span-3 lg:order-2">
                        <div class="lg:sticky lg:top-20">
                            <div class="card overflow-hidden relative z-0">
                                <div id="overviewMap" class="h-[340px] md:h-[460px] lg:h-[560px] bg-[#efe9e0]"></div>
                                <a href="${routeDir}" target="_blank" rel="noopener" class="flex items-center justify-center gap-2 py-3 text-sm font-semibold transition-colors" style="color:var(--rose);background:#f4e9e9"><i class="fa-solid fa-route"></i> 在 Google 地圖查看完整路線</a>
                            </div>
                        </div>
                    </div>
                    <div class="lg:col-span-2 lg:order-1"><div class="text-xs text-[var(--muted)] mb-3 px-1">共 ${total} 天 · ${total} 個行程地點</div>${list}</div>
                </div>`;
        }

        function initHomeMap() {
            const el = document.getElementById('overviewMap');
            if (!el || typeof L === 'undefined') return;
            if (homeMap) { homeMap.remove(); homeMap = null; }
            homeMarkers = {};
            homeMap = L.map(el, { scrollWheelZoom: false, zoomControl: true });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19, subdomains: 'abcd' }).addTo(homeMap);

            const order = ['vienna', 'lake', 'riviera', 'paris'];
            const latlngs = [], bounds = [];
            order.forEach(key => {
                const st = STAGE[key];
                itineraryData[key].forEach(d => {
                    const c = COORDS[d.mapQuery];
                    if (!c) return;
                    latlngs.push(c); bounds.push(c);
                    const summary = d.schedule.map(s => `<div style="margin:2px 0"><b>${slotStyle(s.time).emoji} ${s.time}</b>　${s.loc}</div>`).join('');
                    const stayLine = d.stay ? `<div style="margin-top:5px;color:#556b4f;font-weight:600">🛏️ ${d.stay}</div>` : '';
                    const popup = `<div style="min-width:210px;max-width:260px">
                        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="background:${st.color};color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px">${d.date}</span><span style="font-size:11px;color:#9a9089">${st.name}</span></div>
                        <div style="font-weight:700;font-size:15px;margin-bottom:6px;color:#4a4440">${d.dayTitle}</div>${summary}${stayLine}
                        <a href="${gmapsLink(d.mapQuery)}" target="_blank" rel="noopener" style="display:inline-block;margin-top:8px;color:#a9797d;font-weight:600;font-size:13px">在 Google 地圖開啟 ↗</a></div>`;
                    const m = L.circleMarker(c, { radius: 8, color: '#fff', weight: 2, fillColor: st.color, fillOpacity: 1 }).addTo(homeMap).bindPopup(popup).bindTooltip(`${d.date}　${d.dayTitle}`, { direction: 'top', offset: [0, -6] });
                    homeMarkers[d.mapQuery] = m;
                });
            });
            L.polyline(latlngs, { color: '#a9797d', weight: 2, opacity: 0.5, dashArray: '5,6' }).addTo(homeMap);
            if (bounds.length) homeMap.fitBounds(bounds, { padding: [40, 40] });
            setTimeout(() => { if (homeMap) { homeMap.invalidateSize(); if (bounds.length) homeMap.fitBounds(bounds, { padding: [40, 40] }); } }, 600);
        }

        async function renderRegion(regionKey) {
            container.classList.remove('fade-in'); void container.offsetWidth; container.classList.add('fade-in');
            if (regionKey === 'home') { container.innerHTML = generateHomeHTML(); initHomeMap(); }
            else if (regionKey === 'booking') { container.innerHTML = generateBookingHTML(); }
            else if (regionKey === 'prep') { container.innerHTML = prepLoadingHTML(); const items = await loadPrepItems(); container.innerHTML = generatePrepHTML(groupPrep(items)); }
            else { container.innerHTML = generateStageHTML(regionKey); }
        }

        function activateTab(region) {
            tabBtns.forEach(b => b.classList.toggle('tab-active', b.getAttribute('data-region') === region));
            renderRegion(region);
            const offset = document.querySelector('header').offsetHeight;
            window.scrollTo({ top: document.querySelector('main').offsetTop - offset - 8, behavior: 'smooth' });
        }

        // 事件委派
        container.addEventListener('click', async function (e) {
            // 切換單日
            const di = e.target.closest('.day-item');
            if (di) {
                const region = di.getAttribute('data-region'), i = Number(di.getAttribute('data-idx'));
                curDay[region] = i;
                container.querySelectorAll('.day-item').forEach(x => x.classList.remove('day-active'));
                di.classList.add('day-active');
                const detail = document.getElementById('day-detail');
                if (detail) detail.innerHTML = dayDetailHTML(itineraryData[region][i], region);
                if (window.matchMedia('(max-width: 1023px)').matches && detail) detail.scrollIntoView({ behavior: 'smooth', block: 'start' });
                return;
            }
            // 卡片內跳分頁
            const ot = e.target.closest('.open-tab');
            if (ot) { activateTab(ot.getAttribute('data-tab')); return; }
            // 總覽地圖點位
            const mb = e.target.closest('.map-loc');
            if (mb) {
                const q = mb.getAttribute('data-q'), m = homeMarkers[q];
                container.querySelectorAll('.map-loc').forEach(x => x.classList.remove('map-loc-on'));
                mb.classList.add('map-loc-on');
                if (homeMap && m) { homeMap.flyTo(m.getLatLng(), 13, { duration: 0.8 }); m.openPopup(); }
                if (window.matchMedia('(max-width: 1023px)').matches) { const el = document.getElementById('overviewMap'); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                return;
            }
            // 勾選清單
            const li = e.target.closest('.ck');
            if (!li) return;
            const willDone = !li.classList.contains('done');
            li.classList.toggle('done', willDone);
            if (li.classList.contains('ck-prep')) {
                const key = li.getAttribute('data-key'), row = li.getAttribute('data-row');
                prepStoreSet(key, willDone);
                if (SHEET_SYNC_URL && row) {
                    try {
                        const res = await fetch(SHEET_SYNC_URL, { method: 'POST', body: JSON.stringify({ key: SHEET_SYNC_KEY, row: Number(row), done: willDone }) });
                        const d = await res.json();
                        if (!d || !d.ok) throw new Error((d && d.error) || '同步失敗');
                    } catch (err) { li.classList.toggle('done', !willDone); prepStoreSet(key, !willDone); alert('同步到 Google Sheet 失敗，已還原本次勾選。\n' + err); }
                }
            }
        });

        tabBtns.forEach(btn => btn.addEventListener('click', function () { activateTab(this.getAttribute('data-region')); }));

        renderRegion('home');
    </script>
</body>
</html>
