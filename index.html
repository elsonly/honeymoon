            if (homeMap) { homeMap.remove(); homeMap = null; }
            homeMarkers = {};

            homeMap = L.map(el, { scrollWheelZoom: false, zoomControl: true });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19, subdomains: 'abcd'
            }).addTo(homeMap);

            const order = ['vienna', 'lake', 'riviera', 'paris'];
            const latlngs = [], bounds = [];
            let seq = 0;
            order.forEach(key => {
                const [stageName, color] = STAGE_OF[key];
                itineraryData[key].forEach(d => {
                    const c = COORDS[d.mapQuery];
                    if (!c) return;
                    seq++;
                    latlngs.push(c); bounds.push(c);
                    const summary = d.schedule.map(s => `<div style="margin:2px 0"><b>${slotEmoji(s.time)} ${s.time}</b>　${s.loc}<br><span style="color:#64748b">${s.act}</span></div>`).join('');
                    const klookLine = d.klook ? `<div style="margin-top:6px;color:#b45309;font-weight:600">💎 ${d.klook}</div>` : '';
                    const popup = `<div style="min-width:210px;max-width:260px">
                        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
                          <span style="background:${color};color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px">${d.date}</span>
                          <span style="font-size:11px;color:#94a3b8">${stageName}</span>
                        </div>
                        <div style="font-weight:700;font-size:15px;margin-bottom:6px;color:#1e293b">${d.dayTitle}</div>
                        ${summary}${klookLine}
                        <a href="${gmapsLink(d.mapQuery)}" target="_blank" rel="noopener" style="display:inline-block;margin-top:8px;color:#0369a1;font-weight:600;font-size:13px">在 Google 地圖開啟 ↗</a>
                    </div>`;
                    const m = L.circleMarker(c, { radius: 8, color: '#fff', weight: 2, fillColor: color, fillOpacity: 1 })
                        .addTo(homeMap)
                        .bindPopup(popup)
                        .bindTooltip(`${d.date}　${d.dayTitle}`, { direction: 'top', offset: [0, -6] });
                    homeMarkers[d.mapQuery] = m;
                });
            });

            // 旅程路線（依序連線）
            L.polyline(latlngs, { color: '#b45309', weight: 2, opacity: 0.45, dashArray: '5,6' }).addTo(homeMap);

            if (bounds.length) homeMap.fitBounds(bounds, { padding: [40, 40] });
            setTimeout(() => { if (homeMap) { homeMap.invalidateSize(); if (bounds.length) homeMap.fitBounds(bounds, { padding: [40, 40] }); } }, 600);
        }

        async function renderRegion(regionKey) {
            container.classList.remove('fade-in');
            void container.offsetWidth;
            container.classList.add('fade-in');

            if (regionKey === 'home') {
                container.innerHTML = generateHomeHTML();
                initHomeMap();
            } else if (regionKey === 'booking') {
                container.innerHTML = generateBookingHTML();
            } else if (regionKey === 'prep') {
                container.innerHTML = prepLoadingHTML();
                const items = await loadPrepItems();
                container.innerHTML = generatePrepHTML(groupPrep(items));
            } else {
                const data = itineraryData[regionKey];
                container.innerHTML = data.map(dayInfo => generateCardHTML(dayInfo)).join('');
            }
        }

        // 勾選清單（事件委派）：行前準備會寫回 Google Sheet + 本機暫存；其餘僅本次瀏覽
        container.addEventListener('click', async function (e) {
            const li = e.target.closest('.ck');
            if (!li) return;
            const willDone = !li.classList.contains('done');
            li.classList.toggle('done', willDone);

            if (li.classList.contains('ck-prep')) {
                const key = li.getAttribute('data-key');
                const row = li.getAttribute('data-row');
                prepStoreSet(key, willDone);
                if (SHEET_SYNC_URL && row) {
                    try {
                        const res = await fetch(SHEET_SYNC_URL, { method: 'POST', body: JSON.stringify({ key: SHEET_SYNC_KEY, row: Number(row), done: willDone }) });
                        const d = await res.json();
                        if (!d || !d.ok) throw new Error((d && d.error) || '同步失敗');
                    } catch (err) {
                        li.classList.toggle('done', !willDone);   // 還原 UI
                        prepStoreSet(key, !willDone);
                        alert('同步到 Google Sheet 失敗，已還原本次勾選。\n' + err);
                    }
                }
            }
        });

        tabBtns.forEach(btn => {
            btn.addEventListener('click', function () {
                tabBtns.forEach(b => { b.classList.remove('tab-active'); b.classList.add('tab-inactive'); });
                this.classList.remove('tab-inactive');
                this.classList.add('tab-active');

                renderRegion(this.getAttribute('data-region'));

                const offset = document.querySelector('header').offsetHeight;
                window.scrollTo({ top: document.querySelector('main').offsetTop - offset - 10, behavior: 'smooth' });
            });
        });

        // 行程總覽地圖：點選地點 → 地圖飛到該圖釘並開啟摘要
        container.addEventListener('click', function (e) {
            const b = e.target.closest('.map-loc');
            if (!b) return;
            const q = b.getAttribute('data-q');
            const m = homeMarkers[q];
            container.querySelectorAll('.map-loc').forEach(x => x.classList.remove('map-loc-on'));
            b.classList.add('map-loc-on');
            if (homeMap && m) {
                homeMap.flyTo(m.getLatLng(), 14, { duration: 0.8 });
                m.openPopup();
            }
            if (window.matchMedia('(max-width: 1023px)').matches) {
                const el = document.getElementById('overviewMap');
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });

        // 初始化顯示首頁總覽
        renderRegion('home');
    </script>
</body>
</html>
